# Base configuration for algo trading bot

trading:
  exchanges:
    - kucoin
    - bybit
  pairs:
    - BTC-USDT
    - ETH-USDT
  timeframes:
    - 1m
    - 5m
    - 15m

websocket:
  kucoin:
    ws_url: "wss://ws-api.kucoin.com/endpoint"
    rest_url: "https://api.kucoin.com"
    ping_interval: 30
  bybit:
    ws_url: "wss://stream.bybit.com/v5/public/spot"
    rest_url: "https://api.bybit.com"

database:
  path: "data/trading.db"

risk:
  max_position_size: 0.02
  stop_loss: 0.01
  take_profit: 0.02
  max_drawdown: 0.05
  # Zero-drawdown risk layer
  regime_detection: true
  regime_lookback: 100
  boltzmann_temperature: 0.3
  bootstrap_stops: true
  bootstrap_confidence: 0.95
  bootstrap_simulations: 1000
  per_trade_drawdown_budget: 0.01
  total_drawdown_budget: 0.03
  # Adaptive position sizing (intra-trade soft stops, regime-aware)
  adaptive_sizing: true
  adaptive_cooldown_candles: 15
  adaptive_min_energy: 0.3
  # Velocity-based position sizing (rate of loss detection)
  velocity_sizing: true
  velocity_cooldown_candles: 10
  velocity_min_energy: 0.3
  velocity_min_pnl_pct: -0.3
  velocity_acceleration_scale: 1.3
  velocity_window_candles: 5
  velocity_min_samples: 3
  # Correlation monitoring (ETH leading BTC indicator)
  correlation_monitor: true
  correlation_lookback_candles: 20
  correlation_mild_divergence_pct: -0.8
  correlation_strong_divergence_pct: -1.6
  correlation_extreme_divergence_pct: -2.5
  correlation_trailing_elevated: 0.75
  correlation_trailing_high: 0.50
  correlation_trailing_extreme: 0.25
  correlation_reduce_at_extreme: 0.25

strategy:
  pyramid_entries: 2
  entry_spacing: 0.005
  volatility_filter: 0.02
  max_parallel: 2

ml:
  feature_window: 60
  horizon: 5
  hidden_dims: [128, 64, 32]

backtest:
  initial_capital: 10000
  commission: 0.001
  slippage_type: "volume"
  slippage_factor: 0.0005